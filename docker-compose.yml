version: "3.9"

services:
  supabase-db:
    image: postgres:15-alpine
    container_name: supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-supabase}
      POSTGRES_USER: ${SUPABASE_DB_USER:-supabase}
      POSTGRES_DB: ${SUPABASE_DB_NAME:-supabase}
    ports:
      - "55432:5432"
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "supabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-db:
    image: postgres:15-alpine
    container_name: temporal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.21.3
    container_name: temporal
    restart: unless-stopped
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - TEMPORAL_CLI_ADDRESS=localhost:7233
    ports:
      - "7234:7233"
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

  temporal-ui:
    image: temporalio/ui:2.21.2
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"

  temporal-worker:
    build: ./temporal
    container_name: temporal-worker
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
      supabase-db:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-main}
      - SUPABASE_URL=${SUPABASE_URL:-http://supabase-db:5432}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-dev-service-role-key}
      - SUPABASE_DB_HOST=${SUPABASE_DB_HOST:-supabase-db}
      - SUPABASE_DB_PORT=${SUPABASE_DB_PORT:-5432}
      - SUPABASE_DB_USER=${SUPABASE_DB_USER:-supabase}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-supabase}
      - SUPABASE_DB_NAME=${SUPABASE_DB_NAME:-supabase}

  game-web:
    build: ./temporal
    container_name: game-web
    restart: unless-stopped
    command: ["uvicorn", "src.web_api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      temporal:
        condition: service_started
      supabase-db:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-main}
      - SUPABASE_DB_HOST=${SUPABASE_DB_HOST:-supabase-db}
      - SUPABASE_DB_PORT=${SUPABASE_DB_PORT:-5432}
      - SUPABASE_DB_USER=${SUPABASE_DB_USER:-supabase}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-supabase}
      - SUPABASE_DB_NAME=${SUPABASE_DB_NAME:-supabase}
    ports:
      - "8095:8000"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      # Allow the browser-based frontend to call the Ollama API directly (dev only).
      - OLLAMA_ORIGINS=*
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    # One-shot: wait for the server, then pull the small model into the shared volume.
    entrypoint: ["/bin/sh", "-c", "sleep 5 && ollama pull qwen2.5:0.5b"]
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    environment:
      - MP_MAX_MESSAGES=500
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Mailpit web UI / API

  mailer:
    build:
      context: ./mailer
    container_name: mailer
    restart: unless-stopped
    depends_on:
      - mailpit
    environment:
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - MAILPIT_API=http://mailpit:8025
    ports:
      - "8200:8000"

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      temporal:
        condition: service_started
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:55432}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-dev-anon-key}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:55432/functions/v1}
      - VITE_OLLAMA_URL=${VITE_OLLAMA_URL:-http://localhost:11434}
      - VITE_OLLAMA_MODEL=${VITE_OLLAMA_MODEL:-qwen2.5:0.5b}
      - VITE_MAILER_URL=${VITE_MAILER_URL:-http://localhost:8200}
    ports:
      - "3000:3000"

  showcase:
    build:
      context: ./showcase
    container_name: showcase
    restart: unless-stopped
    ports:
      - "8090:80"

volumes:
  supabase-db-data:
  temporal-db-data:
  ollama-data:
